<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuma — Staff PIN</title>
<link rel="stylesheet" href="_styles.css">
</head>
<body>
<div class="app-wrap">

  <div class="pin-screen">
    <div class="pin-logo">🛵</div>
    <div class="pin-brand">KUMA RENTAL</div>
    <div class="pin-bike">กข 1234 — Honda PCX 160</div>
    <div class="pin-label">กรอกรหัส PIN ของคุณ</div>
    <div class="pin-dots">
      <div class="pin-dot filled"></div>
      <div class="pin-dot filled"></div>
      <div class="pin-dot filled"></div>
      <div class="pin-dot"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key">1</button>
      <button class="pin-key">2</button>
      <button class="pin-key">3</button>
      <button class="pin-key">4</button>
      <button class="pin-key">5</button>
      <button class="pin-key">6</button>
      <button class="pin-key">7</button>
      <button class="pin-key">8</button>
      <button class="pin-key">9</button>
      <button class="pin-key" style="opacity:0"></button>
      <button class="pin-key">0</button>
      <button class="pin-key del" onclick="location.href='menu.html'">✓</button>
    </div>
    <div style="margin-top:20px;font-size:13px;opacity:.6">กด ✓ เพื่อดู Staff Menu (mockup)</div>
  </div>

</div>
<script src="_script.js"></script>
</body>
</html>
